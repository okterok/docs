<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docs - Markdown Viewer</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #000000;
            color: #00ff00;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 250px;
            background: #1a1a1a;
            border-right: 1px solid #333333;
            overflow-y: auto;
            box-shadow: 0 1px 3px rgba(0, 255, 0, 0.1);
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #333333;
            font-weight: 600;
            font-size: 16px;
            color: #00ff00;
        }

        .file-list {
            list-style: none;
        }

        .file-item {
            padding: 0;
        }

        .file-link {
            display: block;
            padding: 10px 20px;
            color: #a020f0;
            text-decoration: none;
            border-left: 3px solid transparent;
            transition: all 0.2s;
            cursor: pointer;
        }

        .file-link:hover {
            background: #2a2a2a;
            padding-left: 24px;
            color: #c040ff;
        }

        .file-link.active {
            background: #2a2a2a;
            border-left-color: #a020f0;
            font-weight: 600;
            color: #c040ff;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .content-header {
            padding: 20px 30px;
            border-bottom: 1px solid #333333;
            background: #0a0a0a;
            box-shadow: 0 1px 3px rgba(0, 255, 0, 0.05);
        }

        .content-title {
            font-size: 24px;
            font-weight: 600;
            margin: 0;
            color: #00ff00;
        }

        .content-viewer {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            background: #000000;
        }

        .markdown-content {
            max-width: 900px;
            margin: 0 auto;
        }

        /* Markdown styling */
        .markdown-content h1,
        .markdown-content h2,
        .markdown-content h3,
        .markdown-content h4,
        .markdown-content h5,
        .markdown-content h6 {
            margin-top: 24px;
            margin-bottom: 16px;
            font-weight: 600;
            line-height: 1.25;
            color: #00ff00;
        }

        .markdown-content h1 { font-size: 2em; border-bottom: 1px solid #333333; padding-bottom: 0.3em; }
        .markdown-content h2 { font-size: 1.5em; border-bottom: 1px solid #333333; padding-bottom: 0.3em; }
        .markdown-content h3 { font-size: 1.25em; }
        .markdown-content h4 { font-size: 1em; }
        .markdown-content h5 { font-size: 0.875em; }
        .markdown-content h6 { font-size: 0.85em; color: #808080; }

        .markdown-content p {
            margin-bottom: 16px;
            line-height: 1.6;
            color: #00ff00;
        }

        .markdown-content ul,
        .markdown-content ol {
            margin-bottom: 16px;
            padding-left: 2em;
        }

        .markdown-content li {
            margin-bottom: 8px;
            color: #00ff00;
        }

        .markdown-content code {
            background: #1a1a1a;
            border-radius: 3px;
            padding: 0.2em 0.4em;
            margin: 0;
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            font-size: 0.85em;
            color: #00ff00;
            border: 1px solid #333333;
        }

        .markdown-content pre {
            background: #1a1a1a;
            border-radius: 6px;
            padding: 16px;
            overflow-x: auto;
            margin-bottom: 16px;
            border: 1px solid #333333;
        }

        .markdown-content pre code {
            background: none;
            padding: 0;
            margin: 0;
            border: none;
            color: #00ff00;
        }

        .markdown-content blockquote {
            border-left: 4px solid #404040;
            padding: 0 15px;
            color: #808080;
            margin-bottom: 16px;
        }

        .markdown-content img {
            max-width: 100%;
            height: auto;
            border-radius: 6px;
        }

        .markdown-content a {
            color: #a020f0;
            text-decoration: none;
        }

        .markdown-content a:hover {
            text-decoration: underline;
            color: #c040ff;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            font-size: 18px;
            color: #808080;
        }

        .error {
            padding: 20px;
            background: #330000;
            border: 1px solid #ff0000;
            border-radius: 6px;
            color: #ff6666;
            margin: 20px;
        }

        /* Cat Facts Table Styling */
        .cat-facts-section {
            max-width: 900px;
            margin: 0 auto;
        }

        .cat-image-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .cat-image-container img {
            width: 600px;
            height: 600px;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid #00ff00;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
        }

        .cat-facts-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .cat-facts-header h2 {
            margin: 0;
            font-size: 1.5em;
            border-bottom: 1px solid #333333;
            padding-bottom: 0.3em;
            color: #00ff00;
        }

        .refresh-indicator {
            font-size: 12px;
            color: #808080;
            font-style: italic;
        }

        .cat-facts-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 16px;
            box-shadow: 0 1px 3px rgba(0, 255, 0, 0.05);
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #333333;
        }

        .cat-facts-table thead {
            background: #1a1a1a;
            border-bottom: 2px solid #333333;
        }

        .cat-facts-table th {
            padding: 12px 16px;
            text-align: left;
            font-weight: 600;
            color: #00ff00;
        }

        .cat-facts-table td {
            padding: 12px 16px;
            border-bottom: 1px solid #333333;
            line-height: 1.6;
            color: #00ff00;
        }

        .cat-facts-table tr:last-child td {
            border-bottom: none;
        }

        .cat-facts-table tbody tr:hover {
            background: #1a1a1a;
        }

        .fact-number {
            font-weight: 600;
            color: #a020f0;
            width: 40px;
        }

        .fact-loading {
            text-align: center;
            color: #808080;
            font-style: italic;
            padding: 20px;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 200px;
            }
            .content-viewer {
                padding: 15px;
            }
            .cat-facts-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .refresh-indicator {
                margin-top: 8px;
            }
            .cat-image-container img {
                width: 100%;
                height: auto;
                max-width: 600px;
            }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">📚 Files</div>
        <ul class="file-list" id="fileList"></ul>
    </div>

    <div class="main-content">
        <div class="content-header">
            <h1 class="content-title" id="contentTitle">Welcome</h1>
        </div>
        <div class="content-viewer" id="contentViewer">
            <div class="loading">Loading documentation...</div>
        </div>
    </div>

    <script>
        const REPO_OWNER = 'okterok';
        const REPO_NAME = 'docs';
        const API_URL = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}`;
        const EXCLUDED_FILES = ['index.md', 'README.md', 'Cats Blender Plugin.md'];
        const CAT_IMAGE_URL = 'https://upload.wikimedia.org/wikipedia/commons/5/5e/Sleeping_cat_on_her_back.jpg';

        let filesList = [];
        let currentFile = null;
        let catFactsInterval = null;

        // Fetch list of markdown files from repository
        async function loadFilesList() {
            try {
                const response = await fetch(`${API_URL}/contents`);
                const data = await response.json();

                filesList = data
                    .filter(file => file.name.endsWith('.md') && !EXCLUDED_FILES.includes(file.name))
                    .sort((a, b) => a.name.localeCompare(b.name));

                renderFilesList();

                // Load based on URL hash
                const hash = window.location.hash.slice(1);
                if (hash) {
                    loadFile(hash);
                } else {
                    loadWelcome();
                }
            } catch (error) {
                console.error('Error loading files:', error);
                showError('Failed to load files list');
            }
        }

        // Render the file list in the sidebar
        function renderFilesList() {
            const fileList = document.getElementById('fileList');
            fileList.innerHTML = filesList.map(file => `
                <li class="file-item">
                    <a class="file-link" href="#${file.name}" onclick="loadFile('${file.name}'); return false;">
                        ${file.name}
                    </a>
                </li>
            `).join('');
        }

        // Fetch cat facts from the Cat Facts API
        async function fetchCatFacts() {
            try {
                const response = await fetch('https://catfact.ninja/facts?limit=2');
                const data = await response.json();
                return data.data || [];
            } catch (error) {
                console.error('Error fetching cat facts:', error);
                return [];
            }
        }

        // Display cat facts in a table
        async function displayCatFacts() {
            const facts = await fetchCatFacts();
            const tableHtml = `
                <div class="cat-facts-section">
                    <div class="cat-image-container">
                        <img src="${CAT_IMAGE_URL}" alt="A sleeping cat" />
                    </div>
                    <div class="cat-facts-header">
                        <h2>🐱 Random Cat Facts</h2>
                        <div class="refresh-indicator">Refreshes every 60 seconds</div>
                    </div>
                    <table class="cat-facts-table">
                        <thead>
                            <tr>
                                <th class="fact-number">#</th>
                                <th>Fact</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${facts.map((fact, index) => `
                                <tr>
                                    <td class="fact-number">${index + 1}</td>
                                    <td>${fact.fact}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
            return tableHtml;
        }

        // Load and display a markdown file
        async function loadFile(fileName) {
            // Clear existing interval
            if (catFactsInterval) {
                clearInterval(catFactsInterval);
            }

            currentFile = fileName;
            updateActiveLink(fileName);
            
            const viewer = document.getElementById('contentViewer');
            const title = document.getElementById('contentTitle');

            viewer.innerHTML = '<div class="loading">Loading...</div>';
            title.textContent = fileName;

            try {
                const response = await fetch(`${API_URL}/contents/${encodeURIComponent(fileName)}`);
                const data = await response.json();

                // Decode base64 content
                const content = atob(data.content);
                const html = marked.parse(content);

                viewer.innerHTML = `<div class="markdown-content">${html}</div>`;
                window.location.hash = fileName;
            } catch (error) {
                console.error('Error loading file:', error);
                showError(`Failed to load ${fileName}`);
            }
        }

        // Load the welcome page with cat facts
        async function loadWelcome() {
            currentFile = null;
            
            // Clear existing interval
            if (catFactsInterval) {
                clearInterval(catFactsInterval);
            }

            const viewer = document.getElementById('contentViewer');
            const title = document.getElementById('contentTitle');

            title.textContent = 'Welcome';
            viewer.innerHTML = '<div class="loading">Loading cat facts...</div>';

            // Display initial facts
            const catFactsHtml = await displayCatFacts();
            viewer.innerHTML = catFactsHtml;

            // Refresh facts every 60 seconds
            catFactsInterval = setInterval(async () => {
                const catFactsHtml = await displayCatFacts();
                viewer.innerHTML = catFactsHtml;
            }, 60000);

            window.location.hash = '';
        }

        // Update active link styling
        function updateActiveLink(fileName) {
            document.querySelectorAll('.file-link').forEach(link => {
                link.classList.remove('active');
                if (link.textContent.trim() === fileName) {
                    link.classList.add('active');
                }
            });
        }

        // Show error message
        function showError(message) {
            document.getElementById('contentViewer').innerHTML = `
                <div class="error">⚠️ ${message}</div>
            `;
        }

        // Handle hash changes for browser back/forward
        window.addEventListener('hashchange', () => {
            const hash = window.location.hash.slice(1);
            if (!hash) {
                loadWelcome();
            } else if (hash !== currentFile) {
                loadFile(hash);
            }
        });

        // Initialize on page load
        loadFilesList();
    </script>
</body>
</html>
